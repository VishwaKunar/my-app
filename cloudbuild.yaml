options:
  logging: CLOUD_LOGGING_ONLY

steps:
# ✅ Build image with BOTH tags
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/app:$COMMIT_SHA'
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/app:latest'
    - '.'

# ✅ Push BOTH tags
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/app'

images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/app:$COMMIT_SHA'
- 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/app:latest'
